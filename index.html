<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/src/style.css">
  <link rel="shortcut icon" href="/images/favicon-32x32.png" type="image/x-icon">
  <script type="module" src="/src/main.js"></script>
  <title>Todo app</title>
</head>

<body class="relative bg-main min-h-screen font-josefin lg:flex lg:flex-col lg:items-center">
  <span class="absolute left-[50%] translate-x-[-50%] bottom-10 font-normal text-gray-600 whitespace-nowrap -z-10">Drag
    and drop the recorder list</span>
  <img id="bg-img" class="absolute -z-10 top-0 w-full h-55">
  <header class="px-7 py-10 flex items-center justify-between lg:w-125">
    <h2 class="text-4xl text-white font-bold">T O D O</h2>
    <button type="button" class="cursor-pointer" id="toggle-theme-btn">
      <img src="./images/icon-sun.svg" alt="sun icon">
    </button>
  </header>
  <main class="px-7 lg:w-140">
    <section class="mb-5">
      <label class="relative">
        <div
          class="absolute inset-y-0 my-auto left-3 w-7 h-7 rounded-full border border-gray-600 flex items-center justify-center">
        </div>
        <input type="text" placeholder="Create a new todo..." id="todo-input"
          class="bg-primrary w-full h-13 xl:h-16 rounded-lg focus:outline-none pl-14 placeholder:font-normal placeholder:text-gray-600 font-normal text-gray-600">
      </label>
    </section>
    <section class="bg-primrary rounded-lg h-max w-full mb-5">
      <div id="todos" class="flex flex-col mb-3"></div>
      <div class="flex items-center justify-between px-6 pb-2 relative">
        <p class="font-normal text-gray-600 text-lg" id="no-of-todos">0 items left</p>
        <div class="w-full px-4 bg-primrary flex items-center py-4 rounded-lg justify-center gap-x-4 absolute -bottom-20 left-0 right-0 lg:static lg:gap-x-1 lg:px-0 lg:py-0 lg:w-max">
          <label class="font-bold text-gray-600 text-lg has-checked:text-blue-500 cursor-pointer hover:text-purple-100">
            <input type="radio" name="type" value="all" class="appearance-none" checked>
            All
          </label>
          <label class="font-bold text-gray-600 text-lg has-checked:text-blue-500
      cursor-pointer hover:text-purple-100">
            <input type="radio" name="type" value="active" class="appearance-none">
            Active
          </label>
          <label class="font-bold text-gray-600 text-lg has-checked:text-blue-500
      cursor-pointer hover:text-purple-100">
            <input type="radio" name="type" value="completed" class="appearance-none">
            Completed
          </label>
        </div>
        <button type="button" id="delete-all-completed"
          class="font-normal text-gray-600 text-lg cursor-pointer hover:text-purple-300">Clear Completed</button>
      </div>
    </section>

  </main>
</body>

</html>
